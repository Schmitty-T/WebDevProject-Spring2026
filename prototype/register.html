<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Phantom Training</title>
    <link rel="stylesheet" href="homepage.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="body-container">
      <div id="body-description">
        <h3>Join the Program</h3>
        <form id="register-form">
          <input
            type="text"
            id="reg-username"
            placeholder="Username"
            required
            style="display: block; margin: 10px auto; padding: 10px; width: 80%"
          />
          <input
            type="password"
            id="reg-password"
            placeholder="Password"
            required
            style="display: block; margin: 10px auto; padding: 10px; width: 80%"
          />
          <div id="body-button-holder" style="justify-content: center">
            <button type="submit" class="body-button" id="register">
              Create Account
            </button>
          </div>
        </form>
        <p style="text-align: center; margin-top: 10px">
          <a href="homepage.html">Back to Home</a>
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
